<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Client Serveur</title>
    <link rel="stylesheet" href="styles_ATL.css">
</head>
<body>

<div class="container">
    <h2>Exécution du programme</h2>
    
    <div class="animation-area">
        <div class="node ATL">💻 ATL</div>
        <div class="node PATV">🖥️ Plateforme</div>
		<div class="node LDD" id = "animation_scan">🖥️ Radar</div>

        <div class="arrow arrow_creation_scan" id="arrow_creation_scan">Demande de scan➡️</div>
        <div class="arrow arrow_reveil_LDD" id="arrow_reveil_LDD">Activation du radar➡️</div>
        <div class="arrow arrow_remonte_scan" id="arrow_remonte_scan">⬅️Remontée du scan</div>
        <div class="arrow arrow_analyse_scan" id="arrow_analyse_scan">Récupération du résultat➡️</div>
		<img class = "image_parametre" src="logo paramètre.png" id = "image_parametre"/>
    </div>

    <p class="description" id="stepDesc">Étape 0 : Prêt. Cliquez sur la flèche de droite pour commencer.</p>

    <div class="controls">
        <button id="prevBtn" disabled>⬅️ Reculer</button>
        <button id="nextBtn">Avancer ➡️</button>
    </div>
</div>

<script src="java_ATL.js"></script>
</body>
</html>
